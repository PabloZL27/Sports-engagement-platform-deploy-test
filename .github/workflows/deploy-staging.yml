name: Deploy Staging Backend

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-staging
  cancel-in-progress: false

env:
  # Keep health paths easy to adjust as service coverage changes.
  REQUIRED_HEALTH_PATHS: "/matches/health"
  OPTIONAL_HEALTH_PATHS: "/profile/health /store/health /community/health"
  DEPLOY_SETTLE_SECONDS: "30"
  HEALTH_RETRY_ATTEMPTS: "12"
  HEALTH_RETRY_DELAY_SECONDS: "10"

jobs:
  preflight:
    name: Deployment Preflight
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Confirm trigger and required secrets
        shell: bash
        env:
          COOLIFY_DEPLOY_WEBHOOK_URL: ${{ secrets.COOLIFY_DEPLOY_WEBHOOK_URL }}
          COOLIFY_API_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
          STAGING_API_BASE_URL: ${{ secrets.STAGING_API_BASE_URL }}
        run: |
          set -euo pipefail

          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            echo "This workflow must not deploy from pull_request events."
            exit 1
          fi

          missing=0
          if [ -z "${COOLIFY_DEPLOY_WEBHOOK_URL}" ]; then
            echo "Missing required secret: COOLIFY_DEPLOY_WEBHOOK_URL"
            missing=1
          fi
          if [ -z "${COOLIFY_API_TOKEN}" ]; then
            echo "Missing required secret: COOLIFY_API_TOKEN"
            missing=1
          fi
          if [ -z "${STAGING_API_BASE_URL}" ]; then
            echo "Missing required secret: STAGING_API_BASE_URL"
            missing=1
          fi

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

          echo "Staging deployment preflight passed."
          echo "Existing PR Checks should remain required by branch protection before changes reach main."

  deploy:
    name: Trigger Coolify And Smoke Test
    runs-on: ubuntu-latest
    needs: preflight
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trigger Coolify deployment
        shell: bash
        env:
          COOLIFY_DEPLOY_WEBHOOK_URL: ${{ secrets.COOLIFY_DEPLOY_WEBHOOK_URL }}
          COOLIFY_API_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
        run: |
          set -euo pipefail

          echo "Triggering Coolify staging deployment webhook."
          curl -fsSL \
            -H "Authorization: Bearer $COOLIFY_API_TOKEN" \
            -X POST "$COOLIFY_DEPLOY_WEBHOOK_URL" > /tmp/coolify-deploy-response.txt
          echo "Coolify deployment webhook accepted."

      - name: Wait for deployment to settle
        shell: bash
        run: |
          set -euo pipefail
          echo "Waiting ${DEPLOY_SETTLE_SECONDS}s before smoke tests."
          sleep "$DEPLOY_SETTLE_SECONDS"

      - name: Smoke test staging API
        shell: bash
        env:
          STAGING_API_BASE_URL: ${{ secrets.STAGING_API_BASE_URL }}
        run: |
          set -euo pipefail

          base_url="${STAGING_API_BASE_URL%/}"

          check_endpoint() {
            local path="$1"
            local required="$2"
            local url="${base_url}${path}"
            local attempt

            echo "Checking ${url}"
            for attempt in $(seq 1 "$HEALTH_RETRY_ATTEMPTS"); do
              if curl -fsSL "$url" >/tmp/staging-health-response.txt; then
                echo "- ${path}: passed on attempt ${attempt}"
                return 0
              fi

              echo "- ${path}: attempt ${attempt}/${HEALTH_RETRY_ATTEMPTS} failed; retrying in ${HEALTH_RETRY_DELAY_SECONDS}s"
              sleep "$HEALTH_RETRY_DELAY_SECONDS"
            done

            if [ "$required" = "required" ]; then
              echo "- ${path}: failed after ${HEALTH_RETRY_ATTEMPTS} attempts"
              return 1
            fi

            echo "- ${path}: skipped as unavailable optional endpoint"
            return 0
          }

          for path in $REQUIRED_HEALTH_PATHS; do
            check_endpoint "$path" required
          done

          for path in $OPTIONAL_HEALTH_PATHS; do
            check_endpoint "$path" optional
          done

          echo "Staging API smoke tests completed."
