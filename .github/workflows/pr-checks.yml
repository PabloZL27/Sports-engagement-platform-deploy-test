name: PR Checks

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate Repository
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            apps/*/package-lock.json
            services/*/package-lock.json

      - name: Repository discovery
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p .ci-reports

          find apps -mindepth 2 -maxdepth 2 -name package.json -print 2>/dev/null | sort > .ci-reports/detected-app-package-json.txt || true
          find services -mindepth 2 -maxdepth 2 -name package.json -print 2>/dev/null | sort > .ci-reports/detected-service-package-json.txt || true
          find infra -maxdepth 1 \( -name "docker-compose.yml" -o -name "docker-compose.*.yml" -o -name "docker-compose.yaml" -o -name "docker-compose.*.yaml" \) -print 2>/dev/null | sort > .ci-reports/detected-compose-files.txt || true

          sed 's#/package.json$##' .ci-reports/detected-app-package-json.txt > .ci-reports/detected-apps.txt
          sed 's#/package.json$##' .ci-reports/detected-service-package-json.txt > .ci-reports/detected-services.txt

          echo "Detected apps:"
          cat .ci-reports/detected-apps.txt || true
          echo
          echo "Detected services:"
          cat .ci-reports/detected-services.txt || true
          echo
          echo "Detected Compose files:"
          cat .ci-reports/detected-compose-files.txt || true

      - name: Validate frontend apps/web
        shell: bash
        env:
          # Frontend-safe placeholders. These are not real secrets.
          VITE_API_BASE_URL: https://api-staging.example.test
          VITE_SUPABASE_URL: https://supabase-staging.example.test
          VITE_SUPABASE_PUBLISHABLE_DEFAULT_KEY: ci-placeholder-anon-key
          VITE_SUPABASE_FEEDBACK_BUCKET: feedback-images
          VITE_ADMIN_STORE_URL: ""
          VITE_PROXY_TARGET: ""
          VITE_ELEVENLABS_AGENT_ID: ci-placeholder-agent-id
          VITE_CHAT_DEV_USER_ID: 00000000-0000-0000-0000-000000000000
          VITE_DISABLE_SUPABASE: "false"
        run: |
          set -euo pipefail

          if [ ! -f apps/web/package.json ]; then
            echo "apps/web/package.json not found; skipping frontend validation." | tee .ci-reports/frontend-validation.txt
            exit 0
          fi

          cd apps/web

          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

          if node -e "const p=require('./package.json'); process.exit(p.scripts && p.scripts.build ? 0 : 1)"; then
            npm run build
            echo "apps/web build passed" > ../../.ci-reports/frontend-validation.txt
          else
            echo "apps/web has no build script; skipped" > ../../.ci-reports/frontend-validation.txt
          fi

      - name: Validate service packages
        shell: bash
        run: |
          set -euo pipefail

          : > .ci-reports/service-validation.txt

          if [ ! -s .ci-reports/detected-service-package-json.txt ]; then
            echo "No service package.json files detected." | tee -a .ci-reports/service-validation.txt
            exit 0
          fi

          script_exists() {
            local script_name="$1"
            node -e "const p=require('./package.json'); process.exit(p.scripts && p.scripts['${script_name}'] ? 0 : 1)"
          }

          while IFS= read -r pkg; do
            service_dir="$(dirname "$pkg")"
            echo "== ${service_dir} ==" | tee -a .ci-reports/service-validation.txt

            pushd "$service_dir" >/dev/null

            if [ -f package-lock.json ]; then
              npm ci
            else
              npm install
            fi

            for script in lint test build; do
              if script_exists "$script"; then
                echo "Running npm run ${script} in ${service_dir}" | tee -a "$GITHUB_WORKSPACE/.ci-reports/service-validation.txt"
                npm run "$script"
                echo "- ${script}: passed" | tee -a "$GITHUB_WORKSPACE/.ci-reports/service-validation.txt"
              else
                echo "- ${script}: skipped (no script)" | tee -a "$GITHUB_WORKSPACE/.ci-reports/service-validation.txt"
              fi
            done

            popd >/dev/null
          done < .ci-reports/detected-service-package-json.txt

      - name: Validate Docker Compose config
        shell: bash
        run: |
          set -euo pipefail

          cat > .ci-reports/compose-placeholder.env <<'EOF'
          # CI placeholders only. Do not use as real deployment secrets.
          SUPABASE_DOCKER_NETWORK=ci_supabase_net
          PROFILE_DB_URL=postgresql://profile_svc:placeholder@supabase-db:5432/profile_db
          COMMUNITY_DB_URL=postgresql://community_svc:placeholder@supabase-db:5432/community_db
          MATCHES_DB_URL=postgresql://matches_svc:placeholder@supabase-db:5432/matches_db
          ROOMS_DB_URL=postgresql://rooms_svc:placeholder@supabase-db:5432/rooms_db
          ANALYTICS_DB_URL=postgresql://analytics_svc:placeholder@supabase-db:5432/analytics_db
          HISTORY_DB_URL=postgresql://history_svc:placeholder@supabase-db:5432/history_db
          CARDS_DB_URL=postgresql://cards_svc:placeholder@supabase-db:5432/cards_db
          OFFSEASON_DB_URL=postgresql://offseason_svc:placeholder@supabase-db:5432/offseason_db
          NEWS_DB_URL=postgresql://news_svc:placeholder@supabase-db:5432/news_cache
          FEEDBACKMAIL_DB_URL=postgresql://feedback_svc:placeholder@supabase-db:5432/feedback_db
          SUPABASE_URL=https://supabase-staging.example.test
          SUPABASE_ANON_KEY=ci-placeholder-anon-key
          SUPABASE_SERVICE_KEY=ci-placeholder-service-key
          STRIPE_SECRET_KEY=sk_test_placeholder
          STRIPE_WEBHOOK_SECRET=whsec_placeholder
          FRONTEND_URL=https://app-staging.example.test
          GETXAPI_KEY=ci-placeholder-getxapi-key
          NEWS_API_KEY=ci-placeholder-news-key
          NEWS_QUERY=tennessee-titans
          NEWS_PAGE_SIZE=20
          NEWS_SORT=publishedAt
          NEWS_LANGUAGE=en
          NEWS_DB_MANAGE_SCHEMA=false
          OPENAI_API_KEY=
          OPENAI_MODERATION_MODEL=omni-moderation-latest
          PROFILE_SERVICE_URL=http://profile-service:4006
          COMMUNITY_SERVICE_URL=http://community-service:4001
          STORE_SERVICE_URL=http://store-service:4005
          EOF

          : > .ci-reports/compose-validation.txt

          echo "Validating base compose" | tee -a .ci-reports/compose-validation.txt
          docker compose --env-file .ci-reports/compose-placeholder.env -f infra/docker-compose.yml config >/tmp/base-compose.yml
          echo "- infra/docker-compose.yml: passed" | tee -a .ci-reports/compose-validation.txt

          echo "Validating base + local override" | tee -a .ci-reports/compose-validation.txt
          docker compose --env-file .ci-reports/compose-placeholder.env -f infra/docker-compose.yml -f infra/docker-compose.local.yml config >/tmp/local-compose.yml
          echo "- infra/docker-compose.yml + infra/docker-compose.local.yml: passed" | tee -a .ci-reports/compose-validation.txt

          echo "Validating base + Tec override" | tee -a .ci-reports/compose-validation.txt
          docker compose --env-file .ci-reports/compose-placeholder.env -f infra/docker-compose.yml -f infra/docker-compose.tec.yml config >/tmp/tec-compose.yml
          echo "- infra/docker-compose.yml + infra/docker-compose.tec.yml: passed" | tee -a .ci-reports/compose-validation.txt

      - name: Validate env contract
        shell: bash
        run: |
          set -euo pipefail

          compose_files=(
            "infra/docker-compose.yml"
            "infra/docker-compose.local.yml"
            "infra/docker-compose.tec.yml"
          )

          env_examples=(
            "infra/.env.example"
            "infra/.env.local.example"
            "infra/.env.production.example"
            "infra/.env.tec.example"
          )

          : > .ci-reports/compose-vars.txt
          for file in "${compose_files[@]}"; do
            if [ -f "$file" ]; then
              grep -oE '\$\{[A-Za-z_][A-Za-z0-9_]*' "$file" | sed 's/^\${//' >> .ci-reports/compose-vars.txt || true
            fi
          done
          sort -u .ci-reports/compose-vars.txt -o .ci-reports/compose-vars.txt

          : > .ci-reports/env-example-vars.txt
          : > .ci-reports/missing-env-example-files.txt
          for file in "${env_examples[@]}"; do
            if [ -f "$file" ]; then
              grep -E '^[A-Za-z_][A-Za-z0-9_]*=' "$file" | cut -d= -f1 >> .ci-reports/env-example-vars.txt || true
            else
              echo "$file" >> .ci-reports/missing-env-example-files.txt
            fi
          done
          sort -u .ci-reports/env-example-vars.txt -o .ci-reports/env-example-vars.txt

          comm -23 .ci-reports/compose-vars.txt .ci-reports/env-example-vars.txt > .ci-reports/missing-env-vars.txt || true

          {
            echo "# Environment Contract Report"
            echo
            echo "## Compose variables referenced"
            sed 's/^/- `/' .ci-reports/compose-vars.txt | sed 's/$/`/' || true
            echo
            echo "## Missing env example files"
            if [ -s .ci-reports/missing-env-example-files.txt ]; then
              sed 's/^/- `/' .ci-reports/missing-env-example-files.txt | sed 's/$/`/'
            else
              echo "- none"
            fi
            echo
            echo "## Variables referenced by Compose but missing from available infra env examples"
            if [ -s .ci-reports/missing-env-vars.txt ]; then
              sed 's/^/- `/' .ci-reports/missing-env-vars.txt | sed 's/$/`/'
            else
              echo "- none"
            fi
          } | tee .ci-reports/env-validation-report.md
          if [ -s .ci-reports/missing-env-vars.txt ]; then
            echo "Missing required env vars in infra env examples."
            exit 1
          fi

      - name: Legacy infrastructure scan
        shell: bash
        run: |
          set -euo pipefail

          # This scan intentionally excludes Markdown migration history to avoid
          # failing on historical documentation. It does scan tracked source and
          # config files, including env examples and legacy config files.
          patterns='nip\.io|10\.14\.255\.82|supabase\.10\.14\.255\.82|http://localhost:8081|trycloudflare\.com'

          git ls-files \
            ':!:*.md' \
            ':!:**/*.md' \
            ':!:apps/web/public/Build/**' \
            ':!:apps/web/node_modules/**' \
            ':!:**/node_modules/**' \
            > .ci-reports/tracked-non-doc-files.txt

          : > .ci-reports/legacy-infra-scan.txt

          if xargs -a .ci-reports/tracked-non-doc-files.txt grep -nEI "$patterns" > .ci-reports/legacy-infra-scan.txt; then
            echo "Legacy infrastructure references found in non-documentation files:"
            cat .ci-reports/legacy-infra-scan.txt
            exit 1
          fi

          echo "No legacy infrastructure references found in tracked non-documentation files." | tee .ci-reports/legacy-infra-scan.txt

      - name: Final report
        if: always()
        shell: bash
        run: |
          set +e

          {
            echo "# PR Checks Summary"
            echo
            echo "## Detected apps"
            if [ -s .ci-reports/detected-apps.txt ]; then
              sed 's/^/- `/' .ci-reports/detected-apps.txt | sed 's/$/`/'
            else
              echo "- none"
            fi
            echo
            echo "## Detected services"
            if [ -s .ci-reports/detected-services.txt ]; then
              sed 's/^/- `/' .ci-reports/detected-services.txt | sed 's/$/`/'
            else
              echo "- none"
            fi
            echo
            echo "## Detected Compose files"
            if [ -s .ci-reports/detected-compose-files.txt ]; then
              sed 's/^/- `/' .ci-reports/detected-compose-files.txt | sed 's/$/`/'
            else
              echo "- none"
            fi
            echo
            echo "## Frontend validation"
            cat .ci-reports/frontend-validation.txt 2>/dev/null || echo "Not run."
            echo
            echo "## Service validation"
            cat .ci-reports/service-validation.txt 2>/dev/null || echo "Not run."
            echo
            echo "## Compose validation result"
            cat .ci-reports/compose-validation.txt 2>/dev/null || echo "Not run."
            echo
            echo "## Missing env vars"
            if [ -f .ci-reports/env-validation-report.md ]; then
              cat .ci-reports/env-validation-report.md
            else
              echo "Not run."
            fi
            echo
            echo "## Legacy references found"
            cat .ci-reports/legacy-infra-scan.txt 2>/dev/null || echo "Not run."
          } | tee .ci-reports/final-report.md >> "$GITHUB_STEP_SUMMARY"
