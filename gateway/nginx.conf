events {}

http {
    map $http_origin $cors_origin {
        default "";
        "https://app-staging.pzapata.com" $http_origin;
    }

    map $http_upgrade $connection_upgrade {
        default upgrade;
        "" close;
    }

    server {
        listen 8080;
        server_name _;

        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization, x-user-id" always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Vary "Origin" always;

        if ($request_method = OPTIONS) {
            return 204;
        }

        location /matches/ {
            proxy_pass http://matches-service:4002/;
        }

        location /rooms/ {
            proxy_pass http://rooms-service:4003/;
        }

        location /analytics/ {
            proxy_pass http://analytics-service:4004/;
        }

        location /store/ {
            proxy_pass http://store-service:4005/;
        }

        location /news/ {
            proxy_pass http://news-service:4011/;
        }

        location = /feedback {
            proxy_pass http://feedback-service:4012/;
        }

        location /feedback/ {
            proxy_pass http://feedback-service:4012/;
        }

        location /get_products {
            proxy_pass http://store-service:4005;
        }

        location /create_checkout {
            proxy_pass http://store-service:4005/create_checkout;
        }

        location /profile/ {
            proxy_pass http://profile-service:4006/;
        }

        location /cards/ {
            proxy_pass http://cards-service:4009/;
        }

        location /api/cards/ {
            proxy_pass http://cards-service:4009/;
        }

        location /tweets {
            rewrite ^/tweets/?(.*)$ /$1 break;
            proxy_pass http://tweets-service:4007;
        }

        location /history/ {
            proxy_pass http://history-service:4008/;
        }

        location /offseason/ {
            proxy_set_header X-User-Id $http_x_user_id;
            proxy_pass http://offseason-service:4010/;
        }

        location /war-room/ {
            rewrite ^/war-room/(.*)$ /$1 break;
            proxy_pass http://war-room-service:4014;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
        }

        location /community/ {
            proxy_pass http://community-service:4001/;
        }

        location /dashboard/ {
            proxy_pass http://dashboard-service:4015/;
        }

        location /reports/ {
            proxy_pass http://reports-service:4016;
        }

        location /admin-store/ {
            client_max_body_size 10M;
            proxy_pass http://icarus-admin-store:4013/;
        }

        location /webhooks/stripe {
            proxy_pass http://admin-store-service:4013/webhooks/stripe;
        }
    }
}
