services:
  gateway:
    build:
      context: ../gateway
    container_name: icarus-gateway
    ports:
      - "8081:8080"
    depends_on:
      - community-service
      - matches-service
      - rooms-service
      - analytics-service
      - store-service
      - profile-service
      - tweets-service
      - history-service
      - cards-service
      - offseason-service
      - news-service
      - feedback-service
      - admin-store-service
      - dashboard-service
    networks:
      - supabase_net

  community-service:
    build:
      context: ../services/community-service
    container_name: icarus-community
    environment:
      PORT: 4001
      PROFILE_SERVICE_URL: http://profile-service:4006
      COMMUNITY_DB_URL: postgresql://community_svc:CommunitySvc_2026_dev@supabase-db:5432/community_db
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
    ports:
      - "4001:4001"
    networks:
      - supabase_net

  matches-service:
    build:
      context: ../services/matches-service
    container_name: icarus-matches
    environment:
      PORT: 4002
      MATCHES_DB_URL: postgresql://matches_svc:MatchesSvc_2026_dev@supabase-db-do4ksgcc0wksg4wwg4osgk0o:5432/matches_db
      ENABLE_AUTO_SYNC: "false"
      SYNC_INTERVAL_MS: 15000
    networks:
      - supabase_net

  rooms-service:
    build:
      context: ../services/rooms-service
    container_name: icarus-rooms
    environment:
      PORT: 4003
      ROOMS_DB_URL: postgresql://rooms_svc:RoomsSvc_2026_dev@host.docker.internal:15432/rooms_db
      ROOMS_CHAT_PRUNE_INTERVAL_MS: "120000"
    networks:
      - supabase_net

  analytics-service:
    build:
      context: ../services/analytics-service
    container_name: icarus-analytics
    environment:
      PORT: 4004
      ANALYTICS_DB_URL: postgresql://analytics_svc:AnalyticsSvc_2026_dev@host.docker.internal:15432/analytics_db
    networks:
      - supabase_net

  store-service:
    build:
      context: ../services/store-service
    container_name: icarus-store
    environment:
      PORT: 4005
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      FRONTEND_URL: ${FRONTEND_URL}
    networks:
      - supabase_net

  profile-service:
    build:
      context: ../services/profile-service
    container_name: icarus-profile
    environment:
      PORT: 4006
      PROFILE_DB_URL: postgresql://profile_svc:ProfileSvc_2026_dev@host.docker.internal:15432/profile_db
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
    ports:
      - "4006:4006"
    networks:
      - supabase_net

  tweets-service:
    build:
      context: ../services/tweets-service
    container_name: icarus-tweets
    environment:
      PORT: 4007
      GETXAPI_KEY: ${GETXAPI_KEY}
    networks:
      - supabase_net

  history-service:
    build:
      context: ../services/history-service
    container_name: icarus-history
    environment:
      PORT: 4008
      HISTORY_DB_URL: postgresql://history_svc:postgres@host.docker.internal:15432/history_db
    ports:
      - "4008:4008"
    networks:
      - supabase_net

  cards-service:
    build:
      context: ../services/cards-service
    container_name: icarus-cards
    environment:
      PORT: 4009
      CARDS_DB_URL: postgresql://cards_svc:CardsSvc_2026_dev@host.docker.internal:15432/cards_db
    networks:
      - supabase_net

  offseason-service:
    build:
      context: ../services/offseason-service
    container_name: icarus-offseason
    environment:
      PORT: 4010
      OFFSEASON_DB_URL: postgresql://offseason_svc:OffseasonSvc_2026_dev@host.docker.internal:15432/offseason_db
    ports:
      - "4010:4010"
    networks:
      - supabase_net

  news-service:
    build:
      context: ../services/news-service
    container_name: icarus-news
    environment:
      PORT: 4011
      NEWS_API_KEY: ${NEWS_API_KEY}
      NEWS_QUERY: ${NEWS_QUERY:-tennessee-titans}
      NEWS_PAGE_SIZE: ${NEWS_PAGE_SIZE:-20}
      NEWS_SORT: ${NEWS_SORT:-publishedAt}
      NEWS_LANGUAGE: ${NEWS_LANGUAGE:-en}
      NEWS_DB_URL: ${NEWS_DB_URL:-postgresql://news_svc:newsSvc_2026_dev@host.docker.internal:15432/news_cache}
      NEWS_DB_MANAGE_SCHEMA: ${NEWS_DB_MANAGE_SCHEMA:-false}
    networks:
      - supabase_net

  feedback-service:
    build:
      context: ../services/feedback_service
    container_name: icarus-feedback
    environment:
      PORT: 4012
      FEEDBACKMAIL_DB_URL: ${FEEDBACKMAIL_DB_URL}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODERATION_MODEL: ${OPENAI_MODERATION_MODEL:-omni-moderation-latest}
    networks:
      - supabase_net

  admin-store-service:
    build:
      context: ../services/admin-store-service
    container_name: icarus-admin-store
    environment:
      PORT: 4013
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY}
    networks:
      - supabase_net

  dashboard-service:
    build:
      context: ../services/dashboard-service
    container_name: icarus-dashboard
    environment:
      PORT: 4015
      PROFILE_SERVICE_URL: http://icarus-profile:4006
      COMMUNITY_SERVICE_URL: http://icarus-community:4001
      STORE_SERVICE_URL: http://icarus-store:4005
    ports:
      - "4015:4015"
    networks:
      - supabase_net

networks:
  supabase_net:
    external: true
    name: do4ksgcc0wksg4wwg4osgk0o